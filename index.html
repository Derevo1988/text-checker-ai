<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨ Умная проверка текста</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🔍 Умная проверка текста</h1>
    <p class="subtitle">Орфография, пунктуация, стиль — с объяснениями от ИИ</p>

    <textarea id="inputText" placeholder="Вставьте или напишите текст здесь..."></textarea>
    
    <div class="controls">
      <button id="checkBtn" class="btn-primary">🚀 Проверить текст</button>
      <button id="clearBtn" class="btn-secondary">🗑️ Очистить</button>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>🤖 ИИ анализирует текст... (может занять 10-30 сек)</p>
    </div>

    <div id="result" class="hidden">
      <div class="result-header">
        <h3>✅ Результат</h3>
        <button id="copyBtn" class="btn-small">📋 Копировать</button>
      </div>
      
      <div class="tabs">
  <button class="tab-btn active" data-tab="original">🎨 С подсветкой ошибок</button>
  <button class="tab-btn" data-tab="errors">⚠️ Список ошибок</button>
  <button class="tab-btn" data-tab="corrected">📄 Исправленный текст</button>
</div>

<div id="original" class="tab-content active">
  <div id="highlightedText" class="highlighted-text"></div>
</div>

<div id="errors" class="tab-content">
  <ul id="errorsList" class="error-list"></ul>
</div>

<div id="corrected" class="tab-content">
  <pre id="correctedText"></pre>
</div>
      
      <div id="original" class="tab-content">
        <div id="highlightedText"></div>
      </div>
    </div>

    <details class="history-section">
      <summary>📜 История проверок (<span id="historyCount">0</span>)</summary>
      <div id="historyList"></div>
      <button id="clearHistoryBtn" class="btn-small">🗑️ Очистить историю</button>
    </details>
  </div>

  <script src="script.js"></script>
</body>
</html>
